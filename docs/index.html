<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forja — Docs</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#080808;--surface:#111111;--surface-2:#1C1C1C;--border:#222222;
      --accent:#C2F000;--accent-dim:rgba(194,240,0,0.10);
      --text:#FFFFFF;--text-med:#AAAAAA;--muted:#888888;--dim:#444444;
      --font-display:'Bebas Neue',sans-serif;--font-ui:'Syne',sans-serif;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--font-ui);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
    .container{max-width:720px;margin:0 auto;padding:48px 24px}
    .eyebrow{font-size:12px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
    h1{font-family:var(--font-display);font-size:56px;line-height:0.95;letter-spacing:1px;margin-bottom:8px}
    .subtitle{color:var(--muted);font-size:15px;margin-bottom:40px}
    .idea{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px}
    .idea-title{font-family:var(--font-display);font-size:28px;letter-spacing:0.5px;margin-bottom:4px}
    .idea-desc{color:var(--text-med);font-size:14px;margin-bottom:16px}
    .links{display:flex;flex-wrap:wrap;gap:10px}
    .link{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:100px;font-size:13px;font-weight:600;text-decoration:none;transition:all 0.15s}
    .link-accent{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(194,240,0,0.15)}
    .link-accent:hover{background:rgba(194,240,0,0.20);border-color:var(--accent)}
    .link-muted{background:var(--surface-2);color:var(--text-med);border:1px solid var(--border)}
    .link-muted:hover{border-color:var(--muted);color:var(--text)}
    .badge{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:100px;background:var(--accent-dim);color:var(--accent)}
    .footer{margin-top:48px;padding-top:24px;border-top:1px solid var(--border);color:var(--dim);font-size:12px}
  </style>
</head>
<body>
  <div class="container">
    <div class="eyebrow">Documentos do Projeto</div>
    <h1>FORJA</h1>
    <p class="subtitle">App mobile pessoal para registrar treinos na academia</p>

    <div class="idea">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
        <div class="idea-title">FORJA MVP</div>
        <span class="badge">Ativa</span>
      </div>
      <p class="idea-desc">Registro de treinos de hipertrofia com plano ABC, timer de descanso, e fluxo offline-first.</p>
      <div class="links">
        <a href="ideas/forja-mvp/discovery/prd.html" class="link link-accent">PRD v8</a>
        <a href="ideas/forja-mvp/discovery/mockup.html" class="link link-accent">Mockup Interativo</a>
        <a href="ideas/forja-mvp/solution/solution-design.html" class="link link-accent">Solution Design v4</a>
        <a href="ideas/forja-mvp/discovery/conversation.md" class="link link-muted">Discovery Q&A</a>
        <a href="ideas/forja-mvp/solution/conversation.md" class="link link-muted">Solution Q&A</a>
      </div>
    </div>

    <div class="footer">Forja Docs — GitHub Pages</div>
  </div>
</body>
</html>
